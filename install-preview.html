<!doctype html>
<html lang="hi-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BaatBanao — Install Preview</title>
<style>
  :root{
    --bg-primary:#FFF9E8; --bg-secondary:#FFF5DF; --card-cream:#FFFDF8;
    --coral:#FF725F; --coral-2:#FF9278; --text-main:#261818;
    --text-secondary:#75615C; --text-muted:#9D8781; --text-brown:#5A302B;
    --border-soft:#F0DFCF;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'Nunito Sans','Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text-main)}
  body{background:linear-gradient(150deg,#f3ecdf 0%, #ecdcc4 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0}
  .frame{width:100%;max-width:480px;min-height:100vh;background:var(--bg-primary);position:relative;box-shadow:0 0 60px rgba(90,48,30,0.12)}
  @media(min-width:481px){ body{padding:24px 0}.frame{min-height:calc(100vh - 48px);border-radius:28px;overflow:hidden} }

  /* Topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 6px 20px;background:var(--bg-primary);position:sticky;top:0;z-index:20}
  .menu-btn{width:38px;height:38px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:12px;color:var(--text-main)}
  .logo{display:flex;align-items:center;gap:6px;font-family:'Manrope',sans-serif;font-weight:900;font-size:20px}

  /* Install button */
  .bb-install-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#B8790C;border:1px solid var(--border-soft);padding:8px 12px;border-radius:16px;font-family:inherit;font-weight:800;font-size:12.5px;box-shadow:0 4px 10px rgba(65,35,25,0.08);cursor:pointer;transition:transform .15s ease}
  .bb-install-btn:active{transform:scale(0.96)}
  .bb-install-btn svg{width:14px;height:14px}
  .bb-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:bbPulse 1.6s ease-out infinite}
  @keyframes bbPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

  /* Content preview */
  .content{padding:8px 20px 90px 20px;display:flex;flex-direction:column;gap:16px}
  .hero-greeting{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px}
  .hero-greeting h1{margin:0;font-family:'Manrope',sans-serif;font-weight:800;font-size:23px;line-height:1.28}
  .mascot-img{width:72px;height:auto;filter:drop-shadow(0 10px 14px rgba(230,150,20,0.35));animation:floaty 3.2s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
  .hero-card{background:linear-gradient(135deg,var(--coral),var(--coral-2));color:#fff;padding:22px;border-radius:22px;box-shadow:0 15px 25px rgba(232,89,75,0.28);position:relative;overflow:hidden}
  .hero-card::after{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,0.12);border-radius:50%}
  .hero-card h2{margin:0 0 6px 0;font-family:'Manrope',sans-serif;font-weight:900;font-size:24px;position:relative;z-index:1}
  .hero-card p{margin:0;font-weight:600;font-size:14.5px;opacity:.95;position:relative;z-index:1}
  .preview-note{background:#fff;border:1px dashed var(--border-soft);border-radius:14px;padding:12px 14px;font-size:12.5px;color:var(--text-secondary);text-align:center;font-weight:600}
  .try-btn{display:block;margin:8px auto 0;background:var(--coral);color:#fff;border:none;padding:12px 20px;border-radius:14px;font-family:inherit;font-weight:800;font-size:14px;box-shadow:0 8px 16px rgba(232,89,75,0.28);cursor:pointer}

  /* ---------- Install sheet (same styles as install.css) ---------- */
  .bb-install-wrap{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s ease}
  .bb-install-wrap.bb-show{opacity:1;pointer-events:auto}
  .bb-install-scrim{position:absolute;inset:0;background:rgba(20,10,5,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .bb-install-sheet{position:relative;z-index:1;width:100%;max-width:480px;background:#FFFDF8;border-radius:22px 22px 0 0;padding:22px 20px calc(20px + env(safe-area-inset-bottom, 8px)) 20px;box-shadow:0 -20px 60px rgba(0,0,0,0.25);transform:translateY(24px);transition:transform .28s cubic-bezier(.2,.9,.3,1);color:var(--text-main)}
  .bb-install-wrap.bb-show .bb-install-sheet{transform:translateY(0)}
  @media(min-width:481px){.bb-install-wrap{align-items:center}.bb-install-sheet{border-radius:22px;max-width:420px}}
  .bb-close{position:absolute;top:10px;right:12px;width:34px;height:34px;border:none;background:transparent;font-size:24px;line-height:1;color:#9D8781;cursor:pointer;border-radius:10px}
  .bb-install-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .bb-install-icon{width:56px;height:56px;border-radius:14px;box-shadow:0 8px 18px rgba(255,114,95,0.35)}
  .bb-install-head h3{margin:0;font-family:'Manrope',sans-serif;font-weight:900;font-size:18px;line-height:1.25}
  .bb-install-sub{margin:3px 0 0 0;font-size:13px;font-weight:600;color:#75615C}
  .bb-trust{list-style:none;padding:14px;margin:2px 0 14px 0;background:#FFF5DF;border-radius:14px;display:grid;gap:9px}
  .bb-trust li{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#5A302B;line-height:1.35}
  .bb-trust li svg{color:#22c55e;flex-shrink:0}
  .bb-trust li b{color:#261818;font-weight:800}
  .bb-ios-steps{list-style:none;padding:0;margin:6px 0 14px 0;display:grid;gap:8px}
  .bb-ios-steps li{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:#261818;background:#fff;border:1px solid #F0DFCF;padding:10px 12px;border-radius:12px}
  .bb-step-num{width:22px;height:22px;border-radius:50%;background:#FF725F;color:#fff;font-weight:900;font-size:12px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .bb-ios-steps svg{color:#FF725F;margin-left:auto}
  .bb-install-actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .bb-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:16px;background:linear-gradient(135deg,#FF725F,#FF9278);color:#fff;font-family:inherit;font-weight:800;font-size:15px;box-shadow:0 12px 20px rgba(232,89,75,0.32);cursor:pointer}
  .bb-ghost{width:100%;padding:12px;border:none;border-radius:14px;background:transparent;color:#75615C;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .bb-tiny{text-align:center;margin:12px 0 0 0;font-size:11.5px;color:#9D8781;font-weight:600}

  /* Tabs */
  .tabs{display:flex;gap:6px;justify-content:center;margin:14px 20px 0}
  .tab{background:#fff;border:1px solid var(--border-soft);color:var(--text-secondary);padding:8px 14px;border-radius:14px;font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer}
  .tab.on{background:var(--coral);color:#fff;border-color:var(--coral)}
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <button class="menu-btn" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="logo">BaatBanao 🪙</div>
    <button class="bb-install-btn" id="triggerBtn" aria-label="Install BaatBanao app">
      <span class="bb-dot" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
      </svg>
      <span>Install</span>
    </button>
  </div>

  <div class="content">
    <div class="hero-greeting">
      <h1>Namaste! 🙏<br>Aaj kya likhna hai?</h1>
      <img class="mascot-img" src="assets/mascot-coin.png" alt="BaatBanao mascot"/>
    </div>
    <div class="hero-card">
      <h2>Vasooli Mode 💸</h2>
      <p>Paisa bhi wapas, rishta bhi safe 😄</p>
    </div>
    <div class="preview-note">
      Ye <b>Install experience preview</b> hai.<br>
      Neeche tabs se Android / iOS / Generic sheet dekh sakte ho.
    </div>
    <div class="tabs">
      <button class="tab on" data-mode="android">Android</button>
      <button class="tab" data-mode="ios">iOS</button>
      <button class="tab" data-mode="generic">Generic</button>
    </div>
    <button class="try-btn" id="tryBtn">📲 Install Sheet Kholo</button>
  </div>
</div>

<script>
  let currentMode = 'android';

  const iosSteps = `
    <ol class="bb-ios-steps">
      <li><span class="bb-step-num">1</span> Neeche <b>Share</b> button dabaayein
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M20 21H4a1 1 0 0 1-1-1v-9"/></svg>
      </li>
      <li><span class="bb-step-num">2</span> Scroll karke <b>"Add to Home Screen"</b> chunein</li>
      <li><span class="bb-step-num">3</span> <b>Add</b> pe tap karein — bas ho gaya! ✅</li>
    </ol>`;
  const genericNote = `<p style="margin:0 0 12px 0;font-size:13px;color:#5A302B;line-height:1.4;background:#FFF5DF;padding:10px 12px;border-radius:12px">Aapka browser install button abhi support nahi karta.<br>Menu (⋮) → <b>"Install app"</b> ya <b>"Add to Home Screen"</b> select karein.</p>`;

  function buildSheet(mode){
    const inner = mode==='ios' ? iosSteps : (mode==='android' ? '' : genericNote);
    const cta = mode==='android'
      ? `<button class="bb-primary" data-close>
           <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
           Install BaatBanao
         </button>`
      : `<button class="bb-primary" data-close>Samajh gaya</button>`;

    return `
    <div class="bb-install-scrim" data-close></div>
    <div class="bb-install-sheet" role="dialog">
      <button class="bb-close" data-close>&times;</button>
      <div class="bb-install-head">
        <img src="assets/icon-192.png" alt="BaatBanao" class="bb-install-icon"/>
        <div>
          <h3>BaatBanao install karein</h3>
          <p class="bb-install-sub">Phone ki home screen pe app jaisa icon milega</p>
        </div>
      </div>
      <ul class="bb-trust">
        <li><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span>Sirf <b>~1&nbsp;MB</b> — data bachega</span></li>
        <li><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg><span><b>100% safe</b> — koi login nahi, data phone mein rehta hai</span></li>
        <li><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg><span>Offline bhi chalega, ek tap mein khulega</span></li>
        <li><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M2 12h20"/></svg><span>Made in India 🇮🇳 — Bharat ke liye</span></li>
      </ul>
      ${inner}
      <div class="bb-install-actions">
        ${cta}
        <button class="bb-ghost" data-close>Baad mein</button>
      </div>
      <p class="bb-tiny">Ye ek Progressive Web App hai. Play Store ki zarurat nahi.</p>
    </div>`;
  }

  function open(mode){
    const wrap = document.createElement('div');
    wrap.className='bb-install-wrap';
    wrap.innerHTML = buildSheet(mode);
    document.body.appendChild(wrap);
    requestAnimationFrame(()=>wrap.classList.add('bb-show'));
    wrap.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>{
      wrap.classList.remove('bb-show'); setTimeout(()=>wrap.remove(),220);
    }));
  }

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on'); currentMode = t.dataset.mode;
    });
  });
  document.getElementById('tryBtn').addEventListener('click',()=>open(currentMode));
  document.getElementById('triggerBtn').addEventListener('click',()=>open(currentMode));

  // Auto-open Android sheet on load for demo
  setTimeout(()=>open('android'), 500);
</script>
</body>
</html>
