<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UPI Payment</title>
<meta name="description" content="Pay securely using any UPI app." />
<meta name="theme-color" content="#FFF9E8" />
<meta property="og:title" content="UPI Payment" />
<meta property="og:description" content="Pay securely using any UPI app." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="UPI Payment" />
<meta name="twitter:description" content="Pay securely using any UPI app." />
<style>
:root{--bg:#FFF9E8;--card:#FFFDF8;--text:#261818;--muted:#75615C;--border:#F0DFCF;--green:#25D366;--warn:#9A6810;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:linear-gradient(150deg,#FFF9E8,#FFF1D6);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:18px}.card{width:min(390px,100%);background:var(--card);border:1px solid var(--border);border-radius:28px;box-shadow:0 20px 50px rgba(90,48,30,.16);padding:20px;text-align:center}.brand{font-weight:900;font-size:22px;margin-bottom:4px}.sub{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:16px}.qr{width:280px;max-width:100%;border-radius:20px;background:#fff;padding:10px;border:1px solid var(--border)}.name{font-size:18px;font-weight:900;margin-top:14px}.upi{font-weight:900;color:var(--text);margin-top:4px;word-break:break-all}.amount{font-weight:900;color:var(--warn);margin-top:6px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{border:none;border-radius:18px;padding:14px 12px;font-weight:900;font-size:15px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}.primary{background:var(--green);color:#fff}.secondary{background:#FFF5DF;color:var(--text);border:1px solid var(--border)}.hint{background:#FFF0C7;border:1px solid var(--border);border-radius:16px;padding:12px;margin-top:16px;text-align:left;color:var(--warn);font-weight:700;font-size:12.5px;line-height:1.45}.bad{color:#B23A2C;font-weight:900;padding:30px 10px}.small{font-size:12px;color:var(--muted);font-weight:700;margin-top:12px}@media(max-width:360px){.btns{grid-template-columns:1fr}.card{padding:16px}}
</style>
</head>
<body>
<div class="card" id="app">
  <div class="brand">UPI Payment</div>
  <div class="sub">Pay securely using any UPI app.</div>
  <div class="bad">Loading payment...</div>
</div>
<script>
(function(){
  function qs(){ return new URLSearchParams(location.search); }
  function clean(v){ return String(v||'').trim(); }
  function validUpi(v){ return /^[a-z0-9._-]{2,}@[a-z0-9._-]{2,}$/i.test(clean(v)); }
  function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function money(v){ var n=Number(v); return n>0 ? '₹' + n.toLocaleString('en-IN') : 'Amount payer can enter'; }
  var p = qs();
  var pa = clean(p.get('pa') || p.get('u')).toLowerCase();
  var pn = clean(p.get('pn') || p.get('n')) || 'UPI User';
  var am = clean(p.get('am') || p.get('a'));
  var tn = clean(p.get('tn') || p.get('t')) || 'Payment request';
  if(!validUpi(pa)){
    document.getElementById('app').innerHTML = '<div class="brand">UPI Payment</div><div class="sub">Pay securely using any UPI app.</div><div class="bad">Invalid UPI payment link.</div>';
    return;
  }
  var params = new URLSearchParams();
  params.set('pa', pa); params.set('pn', pn); if(Number(am)>0) params.set('am', String(Number(am))); params.set('cu','INR'); if(tn) params.set('tn', tn.slice(0,70));
  var upi = 'upi://pay?' + params.toString();
  var qr = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=12&data=' + encodeURIComponent(upi);
  document.getElementById('app').innerHTML = `
    <div class="brand">UPI Payment</div>
    <div class="sub">Pay securely using any UPI app.</div>
    <img class="qr" src="${qr}" alt="UPI QR" width="280" height="280" />
    <div class="name">${esc(pn)}</div>
    <div class="upi">${esc(pa)}</div>
    <div class="amount">${esc(money(am))}</div>
    <div class="btns">
      <a class="btn primary" id="openUpi" href="${upi}">Open UPI App</a>
      <button class="btn secondary" id="copyBtn">Copy UPI Link</button>
      <button class="btn secondary" id="shareQr" style="grid-column:1/-1;">Share QR Image</button>
    </div>
    <div class="hint">If the UPI app does not open automatically, tap “Open UPI App” or scan the QR using any UPI app.</div>
    <div class="small">Secure UPI payment</div>`;
  document.getElementById('copyBtn').onclick = function(){
    if(navigator.clipboard) navigator.clipboard.writeText(upi).then(function(){ alert('UPI link copied'); });
    else alert(upi);
  };
  document.getElementById('shareQr').onclick = async function(){
    try{
      var res = await fetch(qr.replace('size=280x280','size=800x800'));
      var blob = await res.blob();
      var file = new File([blob], 'upi-qr.png', {type: blob.type || 'image/png'});
      var text = pn + '\n' + money(am) + '\nUPI: ' + pa;
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({title:'UPI Payment', text:text, files:[file]});
      } else if(navigator.share){
        await navigator.share({title:'UPI Payment', text:text, url:qr});
      } else {
        window.open(qr, '_blank');
      }
    }catch(e){ window.open(qr, '_blank'); }
  };
  setTimeout(function(){ location.href = upi; }, 700);
})();
</script>
</body>
</html>
